<script>
function calcPress(value){document.getElementById('calc-input').value+=value;}
function calcClear(){document.getElementById('calc-input').value='';document.getElementById('calc-result').textContent='Cleared.';}
function calcBack(){const el=document.getElementById('calc-input');el.value=el.value.slice(0,-1);}
function calcRun(){
  const expr=document.getElementById('calc-input').value.trim();
  const out=document.getElementById('calc-result');
  if(!expr){out.textContent='Enter a calculation first.';return;}
  if(!/^[0-9+\-*/().%\s]+$/.test(expr)){out.textContent='Only numbers, spaces, brackets, and + - * / % are allowed.';return;}
  try{
    const result=Function('"use strict"; return ('+expr+');')();
    if(!Number.isFinite(result)){out.textContent='Result is not a finite number.';return;}
    out.textContent='Result: '+result;
  }catch(e){out.textContent='Invalid expression.';}
}
document.getElementById('calc-input').addEventListener('keydown',function(e){if(e.key==='Enter')calcRun();});
</script>
